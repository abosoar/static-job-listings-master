<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Job Listings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css" />
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/queries.css">
  <script type="module" src="./js/script.mjs" defer></script>
</head>

<body>
  <header>

    <div class="filters-panel hidden">
      <div class="filters">
<div class="clear-filters">Clear</div>
      </div>
    </div>
  </header>
  <div class="jobs-container">
    <template id="job-template">
      <div class="job">
        <img src="" alt="" class="company-logo">
        <div class="job-info">
          <div class="info-header">
            <h2 class="company"></h2>
            <div class="badges">
              <p class="badge badge-new">new!</p>
              <p class="badge badge-featured">featured</p>
            </div>
          </div>
          <p class="position"></p>
          <p class="job-details">
            <span class="posted-at"></span>&bull;
            <span class="contract"></span>&bull;
            <span class="location"></span>
          </p>
        </div>
        <div class="tags">
        </div>
      </div>
    </template>

  </div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="https://www.frontendmentor.io/profile/abosoar">Mohammed Abualnasr</a>.
  </footer>
</body>

</html>
